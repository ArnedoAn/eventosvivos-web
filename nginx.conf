server {
  listen 80;
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # NOTE: /api should be reverse-proxied to the backend or the API base URL
  # configured at runtime. The default build-time value is defined in
  # src/environments/environment.ts.
}
