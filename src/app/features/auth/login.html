<div class="flex min-h-screen items-center justify-center bg-background px-4">
  <div hlmCard class="w-full max-w-sm">
    <div hlmCardHeader>
      <h1 hlmCardTitle>Iniciar sesión</h1>
      <p hlmCardDescription>Ingresa tus credenciales para continuar.</p>
    </div>
    <div hlmCardContent>
      <form
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
        aria-label="Inicio de sesión"
        class="flex flex-col gap-4"
      >
        <div hlmField>
          <label hlmFieldLabel for="email">Correo electrónico</label>
          <input
            hlmInput
            id="email"
            type="email"
            formControlName="email"
            autocomplete="email"
            placeholder="tu@correo.com"
          />
          <hlm-field-error validator="required">El correo es requerido.</hlm-field-error>
          <hlm-field-error validator="email">Correo inválido.</hlm-field-error>
        </div>

        <div hlmField>
          <label hlmFieldLabel for="password">Contraseña</label>
          <input
            hlmInput
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            placeholder="••••••"
          />
          <hlm-field-error validator="required">La contraseña es requerida.</hlm-field-error>
          <hlm-field-error validator="minlength">Mínimo 6 caracteres.</hlm-field-error>
        </div>

        @if (errorMessage()) {
          <div hlmAlert variant="destructive" role="alert">
            <p hlmAlertDescription>{{ errorMessage() }}</p>
          </div>
        }

        <button hlmBtn type="submit" class="w-full" [disabled]="form.invalid || pending()">
          @if (pending()) {
            <hlm-spinner class="mr-2" aria-label="Cargando" />
          }
          {{ pending() ? 'Iniciando sesión...' : 'Iniciar sesión' }}
        </button>
      </form>
    </div>
  </div>
</div>
