<header class="border-b border-border px-4 py-2">
  <nav aria-label="Main navigation" class="flex items-center gap-1">
    <a hlmBtn variant="ghost" routerLink="/events">Eventos</a>

    @if (authStore.role() === 'Admin') {
      <a hlmBtn variant="ghost" routerLink="/events/new">Nuevo evento</a>
      <a hlmBtn variant="ghost" routerLink="/admin/reservations">Reservaciones</a>
    }

    @if (authStore.isAuthenticated()) {
      <button hlmBtn variant="ghost" (click)="logout()">Cerrar sesión</button>
    } @else {
      <a hlmBtn variant="ghost" routerLink="/login">Iniciar sesión</a>
    }
  </nav>
</header>

<main class="container mx-auto px-4 py-6">
  <router-outlet />
</main>

<app-notification-host />
